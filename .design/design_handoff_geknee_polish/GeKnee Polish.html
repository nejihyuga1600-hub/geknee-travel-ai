<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">

/* ==== design-canvas.jsx ==== */

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// Shared cosmic globe — CSS/SVG take on the Three.js original. Handles fly-to by lat/lon.
const { useEffect, useRef, useState, useMemo } = React;

// A few iconic landmark positions (lat, lon) — subset of the repo's L map
const LANDMARKS = [
  { id: 'eiffel',   name: 'Eiffel Tower',     city: 'Paris',          lat: 48.86,   lon:   2.29 },
  { id: 'fuji',     name: 'Mount Fuji',       city: 'Japan',          lat: 35.36,   lon: 138.73 },
  { id: 'machu',    name: 'Machu Picchu',     city: 'Peru',           lat: -13.16,  lon: -72.54 },
  { id: 'taj',      name: 'Taj Mahal',        city: 'Agra',           lat: 27.17,   lon:  78.04 },
  { id: 'colos',    name: 'Colosseum',        city: 'Rome',           lat: 41.89,   lon:  12.49 },
  { id: 'opera',    name: 'Sydney Opera',     city: 'Sydney',         lat: -33.86,  lon: 151.21 },
  { id: 'petra',    name: 'Petra',            city: 'Jordan',         lat: 30.33,   lon:  35.44 },
  { id: 'cristo',   name: 'Christ Redeemer',  city: 'Rio',            lat: -22.95,  lon: -43.21 },
  { id: 'wall',     name: 'Great Wall',       city: 'China',          lat: 40.43,   lon: 116.57 },
  { id: 'pyramid',  name: 'Pyramids of Giza', city: 'Egypt',          lat: 29.98,   lon:  31.13 },
  { id: 'santorini',name: 'Santorini',        city: 'Greece',         lat: 36.39,   lon:  25.46 },
  { id: 'bali',     name: 'Uluwatu',          city: 'Bali',           lat: -8.83,   lon: 115.09 },
  { id: 'iceland',  name: 'Blue Lagoon',      city: 'Iceland',        lat: 63.88,   lon: -22.45 },
  { id: 'patagonia',name: 'Torres del Paine', city: 'Patagonia',      lat: -50.94,  lon: -73.41 },
];

// Project lat/lon to 2D given a camera rotation (yaw=long-rotation, pitch=tilt)
function project(lat, lon, yaw, pitch, R) {
  const φ = (lat * Math.PI) / 180;
  const λ = ((lon + yaw) * Math.PI) / 180;
  // 3D point on unit sphere
  let x = Math.cos(φ) * Math.sin(λ);
  let y = Math.sin(φ);
  let z = Math.cos(φ) * Math.cos(λ);
  // apply pitch rotation around X axis
  const p = (pitch * Math.PI) / 180;
  const y2 = y * Math.cos(p) - z * Math.sin(p);
  const z2 = y * Math.sin(p) + z * Math.cos(p);
  return { x: x * R, y: y2 * R, z: z2, visible: z2 > -0.05 };
}

function Globe({
  size = 460,
  accent = '#a78bfa',
  target = null,            // { lat, lon } — triggers flyTo
  onLandmarkClick,
  showLandmarks = true,
  quiet = false,            // if true, more restrained styling
  dense = false,            // include bloom + outer ring
  idleSpin = true,
}) {
  const [yaw, setYaw] = useState(-15);
  const [pitch, setPitch] = useState(-18);
  const [dragging, setDragging] = useState(false);
  const last = useRef({ x: 0, y: 0 });
  const rafRef = useRef();
  const flyRef = useRef();
  const [hover, setHover] = useState(null);
  const R = size / 2 - 18;

  // idle rotation
  useEffect(() => {
    if (!idleSpin || dragging || flyRef.current) return;
    let raf;
    const tick = () => {
      setYaw(y => y - 0.04);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [idleSpin, dragging]);

  // fly to target
  useEffect(() => {
    if (!target) return;
    if (flyRef.current) cancelAnimationFrame(flyRef.current);
    // desired yaw rotates so that target.lon sits at 0 (facing camera)
    const targetYaw   = -target.lon;
    const targetPitch = -target.lat + 5; // slight tilt
    const startYaw   = ((yaw + 540) % 360) - 180;
    const startPitch = pitch;
    // shortest-path yaw
    let dYaw = targetYaw - startYaw;
    while (dYaw > 180)  dYaw -= 360;
    while (dYaw < -180) dYaw += 360;
    const startT = performance.now();
    const dur = 1400;
    const tick = (now) => {
      const t = Math.min(1, (now - startT) / dur);
      const e = 1 - Math.pow(1 - t, 3);
      setYaw(startYaw + dYaw * e);
      setPitch(startPitch + (targetPitch - startPitch) * e);
      if (t < 1) {
        flyRef.current = requestAnimationFrame(tick);
      } else {
        flyRef.current = null;
      }
    };
    flyRef.current = requestAnimationFrame(tick);
    return () => flyRef.current && cancelAnimationFrame(flyRef.current);
  }, [target]);

  const onDown = (e) => {
    const pt = e.touches ? e.touches[0] : e;
    last.current = { x: pt.clientX, y: pt.clientY };
    setDragging(true);
  };
  const onMove = (e) => {
    if (!dragging) return;
    const pt = e.touches ? e.touches[0] : e;
    const dx = pt.clientX - last.current.x;
    const dy = pt.clientY - last.current.y;
    setYaw(y => y + dx * 0.35);
    setPitch(p => Math.max(-80, Math.min(80, p + dy * 0.3)));
    last.current = { x: pt.clientX, y: pt.clientY };
  };
  const onUp = () => setDragging(false);

  useEffect(() => {
    if (!dragging) return;
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('touchend', onUp);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      window.removeEventListener('touchmove', onMove);
      window.removeEventListener('touchend', onUp);
    };
  }, [dragging]);

  // Build meridian/parallel grid
  const grid = useMemo(() => {
    const lines = [];
    // parallels
    for (let lat = -60; lat <= 60; lat += 30) {
      const pts = [];
      for (let lon = -180; lon <= 180; lon += 6) {
        const p = project(lat, lon, yaw, pitch, R);
        pts.push({ ...p });
      }
      lines.push({ pts, kind: 'parallel', lat });
    }
    // meridians
    for (let lon = -180; lon < 180; lon += 30) {
      const pts = [];
      for (let lat = -85; lat <= 85; lat += 4) {
        const p = project(lat, lon, yaw, pitch, R);
        pts.push({ ...p });
      }
      lines.push({ pts, kind: 'meridian', lon });
    }
    return lines;
  }, [yaw, pitch, R]);

  return (
    <div
      onMouseDown={onDown}
      onTouchStart={onDown}
      style={{
        position: 'relative',
        width: size, height: size,
        userSelect: 'none',
        cursor: dragging ? 'grabbing' : 'grab',
        touchAction: 'none',
      }}
    >

          <radialGradient id="glob-atmo" cx="50%" cy="50%" r="50%">
            <stop offset="60%" stopColor={accent} stopOpacity="0" />
            <stop offset="85%" stopColor={accent} stopOpacity={dense ? 0.35 : 0.18} />
            <stop offset="100%" stopColor={accent} stopOpacity="0" />
          </radialGradient>
          <radialGradient id="glob-fill" cx="38%" cy="35%" r="75%">
            <stop offset="0%"   stopColor="#1a2550" />
            <stop offset="55%"  stopColor="#0b1030" />
            <stop offset="100%" stopColor="#04061a" />
          </radialGradient>
          <radialGradient id="glob-shine" cx="30%" cy="25%" r="45%">
            <stop offset="0%"  stopColor="rgba(255,255,255,0.22)" />
            <stop offset="100%" stopColor="rgba(255,255,255,0)" />
          </radialGradient>
          <filter id="glob-blur"><feGaussianBlur stdDeviation="0.5" /></filter>
        </defs>

        {/* atmosphere */}
        <circle cx="0" cy="0" r={R + 14} fill="url(#glob-atmo)" />
        {/* sphere */}
        <circle cx="0" cy="0" r={R} fill="url(#glob-fill)" stroke={`${accent}33`} strokeWidth="0.6" />

        {/* latitude/longitude grid */}
        <g filter="url(#glob-blur)" opacity={quiet ? 0.35 : 0.55}>
          {grid.map((line, i) => (
            <polyline
              key={i}
              points={line.pts.filter(p => p.visible).map(p => `${p.x},${-p.y}`).join(' ')}
              fill="none"
              stroke={line.kind === 'meridian' && line.lon === 0 ? accent : 'rgba(180,200,255,0.35)'}
              strokeWidth={line.kind === 'meridian' && line.lon === 0 ? 0.9 : 0.6}
              strokeLinecap="round"
            />
          ))}
        </g>

        {/* land-ish blobs — suggestive, not geographic */}
        <LandMasses yaw={yaw} pitch={pitch} R={R} />

        {/* highlight */}
        <circle cx="0" cy="0" r={R} fill="url(#glob-shine)" pointerEvents="none" />

        {/* landmarks */}
        {showLandmarks && LANDMARKS.map(lm => {
          const p = project(lm.lat, lm.lon, yaw, pitch, R);
          if (!p.visible) return null;
          const isHover = hover === lm.id;
          return (
            <g
              key={lm.id}
              transform={`translate(${p.x}, ${-p.y})`}
              onMouseEnter={() => setHover(lm.id)}
              onMouseLeave={() => setHover(null)}
              onClick={(e) => { e.stopPropagation(); onLandmarkClick && onLandmarkClick(lm); }}
              style={{ cursor: 'pointer' }}
            >
              <circle r={isHover ? 8 : 4} fill={accent} opacity={isHover ? 0.2 : 0.5} />
              <circle r={isHover ? 3.2 : 2.2} fill="#fff" />
              {isHover && (
                <g transform="translate(8,-10)">
                  <rect x="0" y="-10" width={lm.name.length * 6.2 + 16} height="20" rx="10"
                    fill="rgba(10,12,28,0.95)" stroke={`${accent}66`} strokeWidth="0.6" />
                  <text x="8" y="4" fontSize="10" fill="#fff" fontFamily="Inter, system-ui">
                    {lm.name}
                  </text>
                </g>
              )}
            </g>
          );
        })}
      </svg>

      {/* subtle starfield around */}
      {dense && <Starfield size={size} />}
    </div>
  );
}

// Stylized continent-ish blobs projected onto the sphere
const CONTINENTS = [
  // Very rough: (lat, lon, rx, ry) ellipses for each continent
  { lat:  50, lon:  15, rx: 28, ry: 18, name: 'eu' },   // Europe
  { lat:  10, lon:  20, rx: 22, ry: 30, name: 'af' },   // Africa
  { lat:  35, lon:  90, rx: 42, ry: 26, name: 'as' },   // Asia
  { lat: -25, lon: 135, rx: 18, ry: 10, name: 'au' },   // Australia
  { lat:  45, lon: -100, rx: 28, ry: 22, name: 'na' },  // N America
  { lat: -15, lon: -60,  rx: 18, ry: 25, name: 'sa' },  // S America
  { lat: -75, lon:   0,  rx: 40, ry: 8,  name: 'an' },  // Antarctica
];

function LandMasses({ yaw, pitch, R }) {
  // sample points across ellipse, project each
  const pts = useMemo(() => {
    const out = [];
    CONTINENTS.forEach(c => {
      const pathPts = [];
      const N = 28;
      for (let i = 0; i <= N; i++) {
        const a = (i / N) * Math.PI * 2;
        const lat = c.lat + Math.sin(a) * c.ry;
        const lon = c.lon + Math.cos(a) * c.rx;
        pathPts.push(project(lat, lon, yaw, pitch, R));
      }
      out.push({ c, pts: pathPts });
    });
    return out;
  }, [yaw, pitch, R]);

  return (
    <g opacity="0.75">
      {pts.map(({ c, pts }) => {
        const visPts = pts.filter(p => p.visible);
        if (visPts.length < 4) return null;
        const d = visPts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${-p.y}`).join(' ') + 'Z';
        return (
          <path key={c.name} d={d}
            fill="rgba(167,139,250,0.22)"
            stroke="rgba(167,139,250,0.5)"
            strokeWidth="0.8"
            strokeLinejoin="round"
          />
        );
      })}
    </g>
  );
}

function Starfield({ size }) {
  const stars = useMemo(() => {
    const out = [];
    for (let i = 0; i < 40; i++) {
      out.push({
        x: (Math.random() - 0.5) * size * 1.4,
        y: (Math.random() - 0.5) * size * 1.4,
        r: Math.random() * 1.2 + 0.3,
        o: Math.random() * 0.5 + 0.2,
      });
    }
    return out;
  }, [size]);
  return (
    <svg width={size} height={size} viewBox={`${-size/2} ${-size/2} ${size} ${size}`}
      style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'visible' }}>
      {stars.map((s, i) => (
        <circle key={i} cx={s.x} cy={s.y} r={s.r} fill="#fff" opacity={s.o} />
      ))}
    </svg>
  );
}

function GenieCorner({ trip, step, steps, open, setOpen, bottomOffset, compact }) {
  const [messages, setMessages] = useState([
    { role: 'genie', text: "Hey — I'm here if you want a nudge. Ask about pricing, seasons, itineraries, anything." },
  ]);
  const [draft, setDraft] = useState('');
  const scrollRef = useRef();

  useEffect(() => {
    scrollRef.current?.scrollTo({ top: 1e6, behavior: 'smooth' });
  }, [messages, open]);

  const send = () => {
    if (!draft.trim()) return;
    const text = draft.trim();
    setMessages(m => [...m, { role: 'user', text }]);
    setDraft('');
    // fake streamed reply
    setTimeout(() => {
      const context = trip.destination
        ? `For ${trip.destination}${trip.style ? ` (${trip.style})` : ''}: `
        : '';
      const replies = [
        `${context}Good question. Based on what you've told me, I'd lean toward shoulder season — fewer crowds, better prices.`,
        `${context}Roughly $${trip.budget === '$' ? 90 : trip.budget === '$$' ? 180 : trip.budget === '$$$' ? 350 : 650}/day covers lodging, food, and a couple of experiences. I can tighten that if you share more.`,
        `${context}I'd budget 2–3 days for the signature spots and leave the rest unstructured. That's usually where the best memories happen.`,
      ];
      setMessages(m => [...m, { role: 'genie', text: replies[Math.floor(Math.random() * replies.length)] }]);
    }, 550);
  };

  const suggestions = step === 0
    ? ['Warm, under $2k', 'Somewhere I can hike', 'Best food in Asia']
    : step === 1
      ? ['When is shoulder season?', 'Cheapest month to fly']
      : step === 2
        ? ['Is adventure too much for a first trip?', 'Explain each style']
        : ['Summarize my trip', 'Estimate total cost'];

  return (
    <>
      {/* Floating trigger */}
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          position: 'absolute',
          right: compact ? 14 : 24,
          bottom: bottomOffset + (compact ? 12 : 16),
          width: compact ? 44 : 52, height: compact ? 44 : 52, borderRadius: 14,
          background: `linear-gradient(135deg, ${BRAND.accent}, ${BRAND.accent2})`,
          color: '#0a0a1f',
          border: `1px solid ${BRAND.borderHi}`,
          cursor: 'pointer',
          display: 'grid', placeItems: 'center',
          fontFamily: TYPE.display, fontSize: 20, fontWeight: 600,
          boxShadow: '0 10px 30px rgba(167,139,250,0.25)',
          zIndex: 30,
          transition: 'transform 150ms, box-shadow 150ms',
          transform: open ? 'scale(0.94)' : 'scale(1)',
        }}
        title="Ask your assistant"
      >✦</button>

      {/* Popover panel */}
      {open && (
        <div style={{
          position: 'absolute',
          right: compact ? 14 : 24,
          bottom: bottomOffset + (compact ? 66 : 82),
          width: compact ? 300 : 360,
          maxHeight: compact ? 420 : 480,
          background: 'rgba(13,13,36,0.96)',
          backdropFilter: 'blur(18px)',
          border: `1px solid ${BRAND.borderHi}`,
          borderRadius: 18,
          boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
          zIndex: 30,
          display: 'flex', flexDirection: 'column',
          animation: 'fadeUp 220ms cubic-bezier(0.23,1,0.32,1)',
        }}>
          {/* Header */}
          <div style={{
            padding: '14px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            borderBottom: `1px solid ${BRAND.border}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <span style={{
                width: 26, height: 26, borderRadius: 8,
                background: `linear-gradient(135deg, ${BRAND.accent}, ${BRAND.accent2})`,
                color: '#0a0a1f', display: 'grid', placeItems: 'center',
                fontFamily: TYPE.display, fontWeight: 600, fontSize: 13,
              }}>✦</span>
              <div>
                <div style={{ fontFamily: TYPE.display, fontSize: 15, fontWeight: 500 }}>Assistant</div>
                <div style={{ fontSize: 10, color: BRAND.inkMute, letterSpacing: '0.1em' }}>
                  <span style={{ color: '#34d399' }}>●</span> ONLINE · {steps[step]}
                </div>
              </div>
            </div>
            <button onClick={() => setOpen(false)} style={{
              background: 'none', border: 'none', color: BRAND.inkMute,
              fontSize: 20, cursor: 'pointer', padding: 4, lineHeight: 1,
            }}>×</button>
          </div>

          {/* Messages */}
          <div ref={scrollRef} style={{
            flex: 1, overflowY: 'auto',
            padding: '14px 16px',
            display: 'flex', flexDirection: 'column', gap: 10,
          }}>
            {messages.map((m, i) => (
              <div key={i} style={{
                alignSelf: m.role === 'genie' ? 'flex-start' : 'flex-end',
                maxWidth: '85%',
                padding: '10px 12px',
                borderRadius: m.role === 'genie' ? '4px 14px 14px 14px' : '14px 4px 14px 14px',
                background: m.role === 'genie' ? 'rgba(167,139,250,0.1)' : 'rgba(255,255,255,0.06)',
                border: `1px solid ${m.role === 'genie' ? BRAND.borderHi : BRAND.border}`,
                color: BRAND.ink, fontSize: 13, lineHeight: 1.5,
                animation: 'fadeUp 200ms ease both',
              }}>{m.text}</div>
            ))}
          </div>

          {/* Suggestion chips */}
          <div style={{
            padding: '0 16px 10px', display: 'flex', gap: 6, flexWrap: 'wrap',
          }}>
            {suggestions.map(s => (
              <button key={s}
                onClick={() => { setDraft(s); setTimeout(send, 50); }}
                style={{
                  fontFamily: TYPE.ui, fontSize: 11,
                  background: 'rgba(255,255,255,0.03)',
                  border: `1px solid ${BRAND.border}`,

                  cursor: 'pointer',
                }}>{s}</button>
            ))}
          </div>

          {/* Input */}
          <div style={{
            padding: 10, borderTop: `1px solid ${BRAND.border}`,

            background: 'rgba(255,255,255,0.02)',
            borderRadius: '0 0 18px 18px',

              value={draft}
              onChange={e => setDraft(e.target.value)}

              placeholder="Ask anything…"
              style={{
                flex: 1, background: 'rgba(255,255,255,0.04)',
                border: `1px solid ${BRAND.border}`, borderRadius: 10,
                padding: '8px 12px', color: BRAND.ink,
                fontFamily: TYPE.ui, fontSize: 13, outline: 'none',
              }}
            />
            <button onClick={send} disabled={!draft.trim()} style={{
              background: draft.trim() ? BRAND.accent : 'rgba(255,255,255,0.05)',
              color: draft.trim() ? '#0a0a1f' : BRAND.inkMute,
              border: 'none', padding: '8px 14px', borderRadius: 10,
              fontFamily: TYPE.ui, fontSize: 12, fontWeight: 600,
              cursor: draft.trim() ? 'pointer' : 'not-allowed',
            }}>Send</button>
          </div>
        </div>
      )}
    </>
  );
}

                : `Start anywhere — I'll fill in the rest. Try typing a mood like "warm islands, under $2k."`}
            </div>
            <input placeholder="Ask anything…" style={{
              marginTop: 10, width: '100%', boxSizing: 'border-box',
              background: 'rgba(255,255,255,0.04)', border: `1px solid ${BRAND.border}`,

              fontFamily: TYPE.ui,
            }} />
          </div>
        )}
      </div>
    </div>
  );
}

// Variant C — "Conversation": the Genie drives, globe is a quiet backdrop, cards appear inline
// (React hooks via globe.jsx)
function ConversationPlanner({ compact = false }) {
  const [trip, updateTrip] = useTripState(DEFAULT_TRIP);
  const [target, setTarget] = useState(null);
  const [messages, setMessages] = useState([
    { role: 'genie', content: "Hi. I'm your travel assistant. Tell me where you're dreaming of — a city, a country, or just a feeling. I'll take it from there." },
  ]);
  const [draft, setDraft] = useState('');
  const [phase, setPhase] = useState('destination'); // destination → dates → style → budget → done
  const endRef = useRef();

  useEffect(() => {
    endRef.current?.scrollTo({ top: 1e6, behavior: 'smooth' });
  }, [messages, phase]);

  const say = (role, content, card) => {
    setMessages(m => [...m, { role, content, card }]);
  };

  const submitInput = () => {
    if (!draft.trim()) return;
    const text = draft.trim();
    setDraft('');
    say('user', text);

    if (phase === 'destination') {
      const match = LANDMARKS.find(l =>
        l.name.toLowerCase().includes(text.toLowerCase()) ||
        l.city.toLowerCase().includes(text.toLowerCase())
      ) || LANDMARKS[Math.floor(Math.random() * LANDMARKS.length)];
      updateTrip({ destination: match.name, lat: match.lat, lon: match.lon });
      setTarget({ lat: match.lat, lon: match.lon });
      setTimeout(() => {
        say('genie', `${match.name} — beautiful choice. When are you thinking of going?`, 'dates');
        setPhase('dates');
      }, 500);
    } else {
      setTimeout(() => say('genie', "Got it."), 300);
    }
  };

  const pickLandmark = (lm) => {
    updateTrip({ destination: lm.name, lat: lm.lat, lon: lm.lon });
    setTarget({ lat: lm.lat, lon: lm.lon });
    say('user', lm.name);
    setTimeout(() => {
      say('genie', `${lm.name}. Nice. When are you thinking?`, 'dates');
      setPhase('dates');
    }, 450);
  };

  const completeCard = (kind, summary) => {
    say('user', summary);
    if (kind === 'dates')  { setTimeout(() => { say('genie', "What kind of trip is this? Relaxed, adventure, foodie…?", 'style'); setPhase('style'); }, 350); }
    if (kind === 'style')  { setTimeout(() => { say('genie', "And budget per person?", 'budget'); setPhase('budget'); }, 350); }
    if (kind === 'budget') { setTimeout(() => { say('genie', "Perfect. I have everything I need. Ready to build your itinerary?", 'review'); setPhase('done'); }, 350); }
  };

  return (
    <div style={{
      position: 'relative', width: '100%', height: '100%',
      background: BRAND.bg, overflow: 'hidden',
      fontFamily: TYPE.ui, color: BRAND.ink,
      display: 'flex', flexDirection: 'column',
    }}>
      {/* Ambient globe behind everything */}
      <div style={{
        position: 'absolute', inset: 0,
        display: 'grid', placeItems: 'center',
        pointerEvents: 'none',
        filter: 'blur(0.5px)',
        opacity: 0.55,
      }}>
        <div style={{ pointerEvents: 'auto' }}>
          <Globe size={compact ? 380 : 700} accent={BRAND.accent} target={target}
            onLandmarkClick={pickLandmark} dense quiet idleSpin={!target} showLandmarks={false} />
        </div>
      </div>
      <StarBg density={compact ? 40 : 80} />

      {/* Top bar */}
      <div style={{
        position: 'relative', zIndex: 10,
        padding: compact ? '14px 18px' : '20px 28px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{
            width: 28, height: 28, borderRadius: 8,
            background: `linear-gradient(135deg, ${BRAND.accent}, ${BRAND.accent2})`,
            display: 'grid', placeItems: 'center',
            fontFamily: TYPE.display, fontWeight: 700, fontSize: 14, color: '#0a0a1f',
          }}>g</div>
          <div style={{ fontFamily: TYPE.display, fontSize: compact ? 17 : 20, fontWeight: 500 }}>geknee</div>
        </div>
        {trip.destination && (
          <div style={{
            display: 'flex', alignItems: 'center', gap: 10,
            background: 'rgba(10,10,31,0.72)', backdropFilter: 'blur(10px)',
            border: `1px solid ${BRAND.border}`, borderRadius: 999,
            padding: '6px 14px', fontSize: 12,
          }}>
            <span style={{ color: BRAND.accent }}>◉</span>
            <span>{trip.destination}</span>
            {trip.nights && <span style={{ color: BRAND.inkMute }}>· {trip.nights}n</span>}
            {trip.style  && <span style={{ color: BRAND.inkMute }}>· {trip.style}</span>}
            {trip.budget && <span style={{ color: BRAND.inkMute }}>· {trip.budget}</span>}
          </div>
        )}
      </div>

      {/* Conversation column */}
      <div ref={endRef} style={{
        flex: 1, overflowY: 'auto',
        display: 'flex', flexDirection: 'column',
        alignItems: 'center',
        padding: compact ? '10px 14px 20px' : '20px 28px 40px',
        position: 'relative', zIndex: 5,
      }}>
        <div style={{ width: '100%', maxWidth: 620, display: 'flex', flexDirection: 'column', gap: 14 }}>
          {messages.map((m, i) => (
            <Bubble key={i} role={m.role} content={m.content} />
          ))}
          {/* Phase card */}
          {phase === 'dates' && (
            <InlineCard title="When are you going?">
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                <Field label="Depart" value={trip.startDate} onChange={v => updateTrip({ startDate: v })} type="date" />
                <Field label="Return" value={trip.endDate} onChange={v => updateTrip({ endDate: v })} type="date" />
              </div>
              <div style={{ marginTop: 14, fontSize: 10, color: BRAND.inkMute, letterSpacing: '0.12em',
                textTransform: 'uppercase', fontWeight: 600 }}>Or stay flexible — {trip.nights} nights</div>
              <input type="range" min="2" max="21" value={trip.nights}
                onChange={e => updateTrip({ nights: +e.target.value })}
                style={{ width: '100%', accentColor: BRAND.accent, marginTop: 4 }} />
              <button
                onClick={() => completeCard('dates', trip.startDate ? `${trip.startDate} → ${trip.endDate}` : `${trip.nights} flexible nights`)}
                style={{
                  marginTop: 12, background: BRAND.accent, color: '#0a0a1f', border: 'none',
                  padding: '10px 16px', borderRadius: 10, fontFamily: TYPE.ui, fontSize: 13, fontWeight: 600,
                  cursor: 'pointer',
                }}>Next →</button>
            </InlineCard>
          )}
          {phase === 'style' && (
            <InlineCard title="What kind of trip?">
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                {['relaxed','adventure','culture','foodie','luxury','budget'].map(s => (
                  <Chip key={s} active={trip.style === s} onClick={() => updateTrip({ style: s })}>
                    {s}
                  </Chip>
                ))}
              </div>
              {trip.style && (
                <button
                  onClick={() => completeCard('style', trip.style)}
                  style={{
                    marginTop: 12, background: BRAND.accent, color: '#0a0a1f', border: 'none',
                    padding: '10px 16px', borderRadius: 10, fontFamily: TYPE.ui, fontSize: 13, fontWeight: 600,
                    cursor: 'pointer',
                  }}>Next →</button>
              )}
            </InlineCard>
          )}
          {phase === 'budget' && (
            <InlineCard title="Budget per person?">
              <div style={{ display: 'flex', gap: 8 }}>
                {['$','$$','$$$','$$$$'].map(b => (
                  <button key={b} onClick={() => updateTrip({ budget: b })}
                    style={{
                      flex: 1, padding: '14px 0',
                      background: trip.budget === b ? 'rgba(167,139,250,0.16)' : 'rgba(255,255,255,0.03)',
                      border: `1px solid ${trip.budget === b ? BRAND.borderHi : BRAND.border}`,
                      borderRadius: 10, color: trip.budget === b ? BRAND.accent : BRAND.inkDim,
                      fontFamily: TYPE.ui, fontSize: 15, fontWeight: 600, cursor: 'pointer',
                    }}>{b}</button>
                ))}
              </div>
              {trip.budget && (
                <button
                  onClick={() => completeCard('budget', trip.budget)}
                  style={{
                    marginTop: 12, background: BRAND.accent, color: '#0a0a1f', border: 'none',
                    padding: '10px 16px', borderRadius: 10, fontFamily: TYPE.ui, fontSize: 13, fontWeight: 600,
                    cursor: 'pointer',
                  }}>Next →</button>
              )}
            </InlineCard>
          )}
          {phase === 'done' && (
            <InlineCard title="Your trip" accent>
              <Row k="Destination" v={trip.destination} />
              <Row k="Dates" v={trip.startDate ? `${trip.startDate} → ${trip.endDate || '?'}` : `${trip.nights} flexible nights`} />
              <Row k="Style" v={trip.style} />
              <Row k="Budget" v={trip.budget} />
              <button style={{
                marginTop: 14, width: '100%', background: BRAND.accent, color: '#0a0a1f', border: 'none',
                padding: '12px', borderRadius: 10, fontFamily: TYPE.ui, fontSize: 14, fontWeight: 600, cursor: 'pointer',
              }}>Build itinerary ✦</button>
            </InlineCard>
          )}

          {/* Suggestion chips while destination phase */}
          {phase === 'destination' && messages.length < 3 && (
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 6 }}>
              {LANDMARKS.slice(0, 6).map(lm => (
                <Chip key={lm.id} small onClick={() => pickLandmark(lm)}>{lm.name}</Chip>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Input bar */}
      <div style={{
        position: 'relative', zIndex: 10,
        padding: compact ? '10px 14px 14px' : '16px 28px 22px',
        display: 'flex', justifyContent: 'center',
      }}>
        <div style={{ width: '100%', maxWidth: 620,
          display: 'flex', gap: 8, alignItems: 'center',
          background: 'rgba(10,10,31,0.85)', backdropFilter: 'blur(14px)',
          border: `1px solid ${BRAND.border}`, borderRadius: 14,
          padding: '6px 6px 6px 16px',
        }}>
          <input
            value={draft} onChange={e => setDraft(e.target.value)}
            onKeyDown={e => { if (e.key === 'Enter') submitInput(); }}
            placeholder={
              phase === 'destination' ? 'Try "warm islands under $2k", "Japan in spring"…' :
              phase === 'done' ? 'Ask me anything about your trip' :
              'Tell me more…'
            }
            style={{
              flex: 1, background: 'transparent', border: 'none', outline: 'none',
              color: BRAND.ink, fontFamily: TYPE.ui, fontSize: 14, padding: '10px 0',
            }}
          />
          <button
            onClick={submitInput}
            disabled={!draft.trim()}
            style={{
              background: draft.trim() ? BRAND.accent : 'rgba(255,255,255,0.06)',
              color: draft.trim() ? '#0a0a1f' : BRAND.inkMute,
              border: 'none', padding: '10px 16px', borderRadius: 10,
              fontFamily: TYPE.ui, fontSize: 13, fontWeight: 600,
              cursor: draft.trim() ? 'pointer' : 'not-allowed',
            }}>Send</button>
        </div>
      </div>
    </div>
  );
}

function Bubble({ role, content }) {
  const isGenie = role === 'genie';
  return (
    <div style={{
      alignSelf: isGenie ? 'flex-start' : 'flex-end',
      maxWidth: '85%',
    }}>
      {isGenie && (
        <div style={{
          fontSize: 10, color: BRAND.accent, letterSpacing: '0.14em',
          textTransform: 'uppercase', fontWeight: 600, marginBottom: 4, paddingLeft: 2,
        }}>
          ✦ Assistant
        </div>
      )}
      <div style={{
        background: isGenie ? 'rgba(167,139,250,0.08)' : 'rgba(255,255,255,0.06)',
        border: `1px solid ${isGenie ? BRAND.borderHi : BRAND.border}`,
        borderRadius: isGenie ? '4px 18px 18px 18px' : '18px 4px 18px 18px',
        padding: '12px 16px',
        color: BRAND.ink, fontSize: 14, lineHeight: 1.55,

}

function InlineCard({ title, children, accent }) {
  return (
    <div style={{
      background: accent

      <div style={{ fontFamily: TYPE.display, fontSize: 18, fontWeight: 400, marginBottom: 14,
        letterSpacing: '-0.01em' }}>
        {title}
      </div>
      {children}
    </div>
  );
}

// ─── InkStamp · reusable passport-style ink stamp ─────────────────────────
// Circular or oval rubber stamp with rotated text arc + center glyph + city
// name + date. Renders as SVG for crispness. Rotatable, tintable.
function InkStamp({
  shape = 'circle', city = 'HANOI', code = 'HAN',
  date = '04·26', glyph = '✈', rotate = -8, size = 120,
  color = '#dc2626', opacity = 0.78, double = false,
}) {
  const r = size / 2;
  const arcId = `stamp-arc-${city}-${code}-${Math.round(rotate * 100)}`;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}
      style={{ transform: `rotate(${rotate}deg)`, opacity, overflow: 'visible' }}>
      <defs>
        <path id={arcId} d={`M ${r},${r} m -${r - 10},0 a ${r - 10},${r - 10} 0 1,1 ${(r - 10) * 2},0`} />
      </defs>
      {/* Outer ring */}
      {shape === 'circle' ? (
        <>
          <circle cx={r} cy={r} r={r - 2} fill="none" stroke={color} strokeWidth="2.2" />
          {double && <circle cx={r} cy={r} r={r - 7} fill="none" stroke={color} strokeWidth="1" />}
          <circle cx={r} cy={r} r={r - 14} fill="none" stroke={color} strokeWidth="1" strokeDasharray="2 2" />
        </>
      ) : (
        <>
          <rect x="2" y={r - size * 0.28} width={size - 4} height={size * 0.56}
            rx={size * 0.28} ry={size * 0.28}
            fill="none" stroke={color} strokeWidth="2.2" />
          {double && <rect x="6" y={r - size * 0.24} width={size - 12} height={size * 0.48}
            rx={size * 0.24} ry={size * 0.24}
            fill="none" stroke={color} strokeWidth="1" />}
        </>
      )}
      {/* Upper arc text */}
      {shape === 'circle' && (
        <text fill={color} fontFamily="ui-monospace,monospace" fontSize={size * 0.1}
          fontWeight="700" letterSpacing={size * 0.025}>
          <textPath href={`#${arcId}`} startOffset="50%" textAnchor="middle">
            ★ ARRIVED · {city} ★
          </textPath>
        </text>
      )}
      {/* Center glyph + details */}
      <g transform={`translate(${r}, ${r})`} fill={color} textAnchor="middle">
        <text y={-size * 0.04} fontFamily="serif" fontSize={size * 0.26} fontStyle="italic">
          {glyph}
        </text>
        <text y={size * 0.14} fontFamily="ui-monospace,monospace" fontSize={size * 0.1} fontWeight="700" letterSpacing={size * 0.01}>
          {code}
        </text>
        <text y={size * 0.25} fontFamily="ui-monospace,monospace" fontSize={size * 0.075} letterSpacing={size * 0.01}>
          {date}
        </text>
      </g>
      {/* Ink bleed spots */}
      <circle cx={size * 0.15} cy={size * 0.2} r="1" fill={color} opacity="0.3" />
      <circle cx={size * 0.82} cy={size * 0.78} r="1.5" fill={color} opacity="0.3" />
    </svg>
  );
}

function PolaroidGlyph({ kind }) {
  const common = { fill: 'none', stroke: '#0a0a1f', strokeWidth: 1.5, strokeLinejoin: 'round', strokeLinecap: 'round' };
  if (kind === 'eiffel') return <svg width="48" height="60" viewBox="0 0 48 60" {...common}><path d="M24 4 L20 18 L16 32 L8 56 L40 56 L32 32 L28 18 Z M14 40 L34 40 M12 48 L36 48"/></svg>;
  if (kind === 'torii') return <svg width="60" height="50" viewBox="0 0 60 50" {...common}><path d="M6 12 Q30 4 54 12 L52 18 L8 18 Z M14 18 L14 46 M46 18 L46 46 M10 24 L50 24"/></svg>;
  if (kind === 'pyramid') return <svg width="60" height="50" viewBox="0 0 60 50" {...common}><path d="M30 6 L54 44 L6 44 Z M30 6 L30 44 M18 30 L30 44 L42 30"/></svg>;
  if (kind === 'aurora') return <svg width="60" height="50" viewBox="0 0 60 50" {...common}><path d="M4 34 Q20 10 32 20 Q40 28 56 14"/><path d="M4 40 Q20 18 32 26 Q40 34 56 22"/></svg>;
  if (kind === 'christ') return <svg width="50" height="60" viewBox="0 0 50 60" {...common}><circle cx="25" cy="10" r="4"/><path d="M25 14 L25 48 M8 24 L42 24 M16 48 L34 48"/></svg>;
  if (kind === 'machu') return <svg width="60" height="50" viewBox="0 0 60 50" {...common}><path d="M4 44 L16 24 L22 30 L30 14 L38 28 L44 20 L56 44"/></svg>;
  return <circle cx="30" cy="30" r="14" {...common} />;
}

function darken(hex) {
  // quick-n-dirty: add 40% black tint
  if (!hex.startsWith('#')) return hex;
  const r = parseInt(hex.slice(1,3), 16) * 0.6;
  const g = parseInt(hex.slice(3,5), 16) * 0.6;
  const b = parseInt(hex.slice(5,7), 16) * 0.6;
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
}

}/*EDITMODE-END*/;

// Apply tweak overrides to BRAND/TYPE before anything mounts
function applyTweaks(t) {
  if (window.BRAND) {
    window.BRAND.accent = t.accent;
    window.BRAND.accent2 = t.accent2;
    window.BRAND.bg = t.bg;
  }
  if (window.TYPE) {
    window.TYPE.display = `'${t.displayFont}', Georgia, serif`;
    window.TYPE.ui = `'${t.uiFont}', system-ui, sans-serif`;
  }
}

    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

    const next = { ...tweaks, [key]: value };

      edits: { [key]: value }

      position: 'fixed', bottom: 20, right: 20, width: 280,

      fontFamily: 'Inter Tight, system-ui, sans-serif',
      boxShadow: '0 20px 60px rgba(0,0,0,0.4)'
    }}>
      <div style={{ fontFamily: 'Fraunces, serif', fontSize: 18, fontWeight: 500,
        marginBottom: 4 }}>Tweaks</div>
      <div style={{ fontSize: 11, color: 'rgba(168,168,192,0.7)', marginBottom: 14,
        letterSpacing: '0.06em' }}>
        Live edits · saved to file

        <ColorSwatches value={tweaks.accent}
        onChange={(v) => update('accent', v)}

      <TweakRow label="Secondary">

        onChange={(v) => update('accent2', v)}
        options={['#7dd3fc', '#fda4af', '#fde68a', '#86efac', '#a78bfa', '#fdba74']} />
      </TweakRow>

      <TweakRow label="Background">
        <div style={{ display: 'flex', gap: 6 }}>

function TweakRow({ label, children }) {

function ColorSwatches({ value, onChange, options }) {

function Toggle({ value, onChange }) {
  return (
    <button onClick={() => onChange(!value)} style={{
      width: 40, height: 22, borderRadius: 11,
      background: value ? '#a78bfa' : 'rgba(255,255,255,0.15)',

}

// Wait for all Babel scripts to settle, then mount

    return setTimeout(mount, 50);
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
}
mount();
